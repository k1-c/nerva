# Nerva configuration file
# Place at ~/.config/nerva/config.toml

[daemon]
# socket_path = "/run/user/1000/nerva/nervad.sock"
log_level = "info"

[policy]
auto_approve_safe = true
auto_approve_caution = false
# blocked_tools = ["run_command_safe"]

[commands]
allowed = [
    "ls",
    "pwd",
    "whoami",
    "date",
    "uname",
    "cat",
    "head",
    "tail",
    "wc",
    "df",
    "free",
    "uptime",
    "hostname",
]

[plugins]
enabled = true
# skills_dir = "~/.config/nerva/skills"
# Each plugin is a subdirectory containing:
#   skill.toml  — manifest (id, name, description, risk, executable)
#   run         — executable script (receives JSON on stdin, outputs JSON on stdout)

[vlm]
enabled = false
ollama_url = "http://localhost:11434"
model = "moondream"

[watchers]
enabled = false
# Send desktop notifications for suggestions
notify = true

[llm]
enabled = false
# Provider: "claude", "openai", or "ollama"
provider = "claude"
model = "claude-sonnet-4-20250514"
# API key (optional — can also use ANTHROPIC_API_KEY or OPENAI_API_KEY env vars)
# api_key = "sk-..."
# Base URL override (for openai-compatible endpoints or ollama)
# base_url = "http://localhost:11434"
#
# Examples:
#   Claude:  provider = "claude",  model = "claude-sonnet-4-20250514"
#   OpenAI:  provider = "openai",  model = "gpt-4o"
#   Ollama:  provider = "ollama",  model = "qwen2.5:7b", base_url = "http://localhost:11434"
